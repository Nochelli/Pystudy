<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Mini VSCode Python</title>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

    <style>

        body {
            margin: 0;
            background: #1e1e1e;
            color: white;
            font-family: Consolas;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .topbar {
            background: #333;
            padding: 10px;
        }

        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        textarea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 20px;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        #output {
            height: 250px;
            background: #111;
            color: #00ff88;
            padding: 15px;
            overflow: auto;
            white-space: pre-wrap;
        }

    </style>

</head>

<body>

    <div class="topbar">
        <button onclick="runPython()">
            ▶ Executar
        </button>
    </div>

    <textarea id="code">
print("Olá mundo!")

for i in range(5):
    print(i)
    </textarea>

    <div id="output">
Terminal...
    </div>

    <script>

        let pyodide;

        async function main() {

            pyodide = await loadPyodide();

            document.getElementById("output").innerText =
                "Python carregado.";

        }

        main();

        async function runPython() {

            const code =
                document.getElementById("code").value;

            const output =
                document.getElementById("output");

            output.innerText = "Executando...";

            try {

                pyodide.runPython(`
import sys
from io import StringIO

sys.stdout = StringIO()
`);

                pyodide.runPython(code);

                const result = pyodide.runPython(
                    "sys.stdout.getvalue()"
                );

                output.innerText = result;

            } catch (err) {

                output.innerText = err;

            }
        }

    </script>

</body>

</html>
